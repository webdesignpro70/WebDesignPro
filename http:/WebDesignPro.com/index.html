<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebDesignPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* Basic reset and styling */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 2rem;
      width: 350px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      text-align: center;
    }
    h1 {
      margin-bottom: 1rem;
      font-weight: 600;
    }
    p {
      margin-bottom: 1.5rem;
      font-weight: 300;
      line-height: 1.5;
    }
    .btn {
      background: #ff4b2b;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 25px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover {
      background: #ff3a1a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to WebDesignPro</h1>
    <p>Your professional web design partner.</p>
    <!-- Button as a link to another page (change href as needed) -->
    <a href="https://webdesignpro70.github.io/WebDesignPro/get-started.html" class="btn">Get Started</a>
  </div>
</body>
</html>
